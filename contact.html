<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | ClarityKey AI</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="stylesheet" href="style.css?v=2.0">
    <style>
        .page-container {
            max-width: 600px;
            margin: 8rem auto 4rem auto;
            padding: 4rem 3rem;
            background: white;
            border-radius: 2rem;
            box-shadow: var(--clay-inset-hi), var(--clay-inset-sh);
            text-align: center;
        }

        @media (max-width: 768px) {
            .page-container {
                margin: 6rem 1rem 4rem 1rem;
                padding: 2.5rem 1.5rem;
            }
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="nav-logo">
            <span
                style="background: linear-gradient(135deg, var(--theme-primary), var(--accent-purple)); width: 32px; height: 32px; border-radius: 10px; display: inline-block; box-shadow: inset 2px 2px 4px rgba(255,255,255,0.5);"></span>
            <a href="index.html" style="text-decoration: none; color: inherit;">ClarityKey AI</a>
        </div>
        <a href="index.html" class="clay-button" style="padding: 0.8rem 2rem; font-size: 1rem;">Back to Home</a>
    </nav>

    <div class="page-container clay-card">
        <div style="font-size: 4rem; margin-bottom: 1.5rem;">✉️</div>
        <h1 style="color: var(--theme-text); margin-bottom: 1.5rem;">Get in Touch</h1>
        <p style="color: var(--theme-text-light); line-height: 1.8; margin-bottom: 3rem; font-size: 1.1rem;">
            Have a question, feedback, or need support with your ClarityKey account? We are here to help and would love
            to hear from you.
        </p>

        <a href="mailto:claritykeyai@gmail.com" class="clay-button"
            style="display: inline-block; padding: 1.2rem 3rem; font-size: 1.1rem; width: 100%; box-sizing: border-box; margin-bottom: 2rem;">
            Email Support
        </a>

        <p style="color: var(--theme-text-light); font-size: 0.95rem;">
            Or reach us directly at <br>
            <strong
                style="color: var(--theme-primary); font-size: 1.1rem; display: inline-block; margin-top: 0.5rem;">claritykeyai@gmail.com</strong>
        </p>
    </div>

    <footer style="padding: 4rem 10%; background: white; text-align: center;">
        <p style="color: var(--theme-text-light);">&copy; 2026 ClarityKey AI. Built for accessibility.</p>
    </footer>
</body>

</html>
