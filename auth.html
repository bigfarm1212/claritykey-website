<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | ClarityKey AI</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="stylesheet" href="style.css?v=2.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f4f8;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 2.5rem;
            box-shadow:
                20px 20px 60px #d9dee3,
                -20px -20px 60px #ffffff,
                inset 10px 10px 20px rgba(255, 255, 255, 0.5);
            text-align: center;
            z-index: 10;
        }

        .auth-card h2 {
            font-size: 2.5rem;
            color: var(--theme-text);
            margin-bottom: 0.5rem;
        }

        .auth-card p {
            color: var(--theme-text-light);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--theme-text-light);
            font-size: 0.9rem;
            padding-left: 0.5rem;
        }

        .auth-input {
            width: 100%;
            padding: 1rem 1.5rem;
            border-radius: 1.25rem;
            border: 2px solid transparent;
            background: #f8fafc;
            box-shadow: inset 4px 4px 8px #e2e8f0, inset -4px -4px 8px #ffffff;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .auth-input:focus {
            border-color: var(--theme-primary);
            box-shadow: inset 2px 2px 4px #e2e8f0, inset -2px -2px 4px #ffffff;
        }

        .auth-button {
            width: 100%;
            margin-top: 1rem;
            padding: 1rem;
            font-size: 1.1rem;
        }

        .auth-switch {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--theme-text-light);
        }

        .auth-switch a {
            color: var(--theme-primary);
            text-decoration: none;
            font-weight: 700;
        }

        .auth-switch a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fee2e2;
            color: #ef4444;
            padding: 0.75rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            display: none;
        }

        .blobs {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: var(--theme-primary);
            top: -100px;
            right: -100px;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: var(--accent-purple);
            bottom: -50px;
            left: -100px;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="blobs">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
        </div>

        <div class="auth-card clay-card">
            <div style="margin-bottom: 1.5rem;">
                <img src="../icon.png" alt="Logo" style="width: 64px; height: 64px; border-radius: 16px;">
            </div>
            <h2 id="auth-title">Welcome Back</h2>
            <p id="auth-subtitle">Sign in to your ClarityKey account</p>

            <div id="error-box" class="error-message"></div>

            <form id="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="auth-input" placeholder="you@example.com" required>
                </div>
                <div class="form-group" id="password-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="auth-input" placeholder="••••••••">
                </div>
                <div class="form-group" id="otp-group" style="display: none;">
                    <label for="otp">Reset Code (Check your email)</label>
                    <input type="text" id="otp" class="auth-input" placeholder="123456">
                </div>

                <div id="forgot-password-link" style="text-align: right; margin-bottom: 1.5rem;">
                    <a href="#" id="forgot-link"
                        style="font-size: 0.8rem; color: var(--theme-primary); text-decoration: none;">Forgot
                        Password?</a>
                </div>

                <button type="submit" id="submit-btn" class="clay-button auth-button">Sign In</button>
            </form>

            <div class="auth-switch">
                <span id="switch-text">Don't have an account?</span>
                <a href="#" id="switch-link">Sign Up</a>
            </div>

            <div style="margin-top: 2rem;">
                <a href="index.html" style="font-size: 0.8rem; color: var(--theme-text-light); text-decoration: none;">←
                    Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://ehdwjvqwgkjfrquqwehj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoZHdqdnF3Z2tqZnJxdXF3ZWhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDQ5MDMsImV4cCI6MjA4ODIyMDkwM30.qQ8J3yKBnqxz6XnjD7JkZSxFaBH87XTs5DLpa34yJvA';

        // Initialize Client - Use a unique name to avoid shadowing the global 'supabase' object
        let supabaseClient = null;
        try {
            if (typeof supabase !== 'undefined') {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log("Supabase initialized successfully.");
            } else {
                console.error("Supabase script (global 'supabase') not found.");
            }
        } catch (e) {
            console.error("Error initializing Supabase:", e);
        }

        const authForm = document.getElementById('auth-form');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');
        const submitBtn = document.getElementById('submit-btn');
        const switchLink = document.getElementById('switch-link');
        const switchText = document.getElementById('switch-text');
        const forgotLink = document.getElementById('forgot-link');
        const forgotPasswordDiv = document.getElementById('forgot-password-link');
        const errorBox = document.getElementById('error-box');

        const passwordGroup = document.getElementById('password-group');
        const otpGroup = document.getElementById('otp-group');
        const passwordInput = document.getElementById('password');
        const otpInput = document.getElementById('otp');

        let mode = 'login'; // 'login', 'signup', 'forgot', 'reset'

        function updateMode(newMode) {
            mode = newMode;
            errorBox.style.display = 'none';
            otpGroup.style.display = 'none';
            passwordGroup.style.display = 'block';
            forgotPasswordDiv.style.display = 'block';

            if (mode === 'login') {
                authTitle.innerText = 'Welcome Back';
                authSubtitle.innerText = 'Sign in to your ClarityKey account';
                submitBtn.innerText = 'Sign In';
                switchText.innerText = "Don't have an account?";
                switchLink.innerText = 'Sign Up';
                passwordInput.placeholder = '••••••••';
            } else if (mode === 'signup') {
                authTitle.innerText = 'Create Account';
                authSubtitle.innerText = 'Start your journey with ClarityKey AI';
                submitBtn.innerText = 'Sign Up';
                switchText.innerText = "Already have an account?";
                switchLink.innerText = 'Sign In';
                passwordInput.placeholder = '••••••••';
            } else if (mode === 'forgot') {
                authTitle.innerText = 'Reset Password';
                authSubtitle.innerText = 'Enter your email to receive a reset code';
                submitBtn.innerText = 'Send Code';
                passwordGroup.style.display = 'none';
                forgotPasswordDiv.style.display = 'none';
                switchText.innerText = "Remember your password?";
                switchLink.innerText = 'Sign In';
            } else if (mode === 'reset') {
                authTitle.innerText = 'Update Password';
                authSubtitle.innerText = 'Enter the code from your email and your new password';
                submitBtn.innerText = 'Update Password';
                otpGroup.style.display = 'block';
                passwordGroup.style.display = 'block';
                forgotPasswordDiv.style.display = 'none';
                passwordInput.placeholder = 'New Password';
                switchText.innerText = "Back to";
                switchLink.innerText = 'Sign In';
            }
        }

        // Check for ?signup=true in URL
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('signup') === 'true') {
            updateMode('signup');
        }

        switchLink.addEventListener('click', (e) => {
            e.preventDefault();
            if (mode === 'signup' || mode === 'forgot' || mode === 'reset') {
                updateMode('login');
            } else {
                updateMode('signup');
            }
        });

        forgotLink.addEventListener('click', (e) => {
            e.preventDefault();
            updateMode('forgot');
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = passwordInput.value;
            const otp = otpInput.value;

            if (!supabaseClient) {
                showError("Supabase connection failed. Please check your internet or configuration.");
                return;
            }

            // Manual validation since 'required' was removed to fix CORS/Hidden field errors
            if (mode === 'login' || mode === 'signup') {
                if (!email || !password) {
                    showError("Please enter both email and password.");
                    return;
                }
            } else if (mode === 'forgot') {
                if (!email) {
                    showError("Please enter your email address.");
                    return;
                }
            } else if (mode === 'reset') {
                if (!email || !otp || !password) {
                    showError("Please enter your email, the reset code, and your new password.");
                    return;
                }
            }

            submitBtn.disabled = true;
            const originalBtnText = submitBtn.innerText;
            submitBtn.innerText = 'Processing...';
            errorBox.style.display = 'none';

            try {
                if (mode === 'login') {
                    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    window.location.href = 'index.html';
                }
                else if (mode === 'signup') {
                    const { data, error } = await supabaseClient.auth.signUp({ email, password });
                    if (error) throw error;
                    if (data.user && data.session === null) {
                        alert("Signup successful! Please check your email for a confirmation link.");
                        updateMode('login');
                    } else if (data.session) {
                        window.location.href = 'index.html';
                    }
                }
                else if (mode === 'forgot') {
                    console.log("Sending reset password email...");
                    const { error } = await supabaseClient.auth.resetPasswordForEmail(email);
                    if (error) throw error;
                    alert("If an account exists for this email, a reset code has been sent!");
                    updateMode('reset');
                }
                else if (mode === 'reset') {
                    console.log("Verifying reset code (OTP)...");
                    // 1. Verify OTP
                    const { error: verifyError } = await supabaseClient.auth.verifyOtp({
                        email,
                        token: otp,
                        type: 'recovery'
                    });
                    if (verifyError) {
                        console.error("OTP Verification Error:", verifyError);
                        throw verifyError;
                    }

                    console.log("OTP Verified. Updating password...");
                    // 2. Update Password (now that we are authenticated via OTP)
                    const { error: updateError } = await supabaseClient.auth.updateUser({ password });
                    if (updateError) {
                        console.error("Password Update Error:", updateError);
                        throw updateError;
                    }

                    console.log("Password updated successfully!");
                    alert("Password updated successfully! You are now signed in.");
                    window.location.href = 'index.html';
                }
            } catch (err) {
                console.error("Auth error details:", err);
                showError(err.message || "An unexpected error occurred. Please try again.");
            } finally {
                // Always re-enable unless we are redirecting away
                if (window.location.href.indexOf('index.html') === -1) {
                    submitBtn.disabled = false;
                    submitBtn.innerText = originalBtnText;
                }
            }
        });

        function showError(msg) {
            errorBox.innerText = msg;
            errorBox.style.display = 'block';
        }
    </script>
</body>

</html>
